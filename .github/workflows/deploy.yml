name: Deploy

on:
  # after tests are finished in master
  workflow_run:
    workflows: [ "Lint & Test" ]
    types: [ completed ]
    branches: [ "master" ]
  # when trigered manually too
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: .cicd/deploy.sh

